name: pypi

on: [push]

jobs:
    Publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                python-version: '3.12'
            - run: python -m pip install build
            - run: python -m build
            - uses: pypa/gh-action-pypi-publish@release/v1
